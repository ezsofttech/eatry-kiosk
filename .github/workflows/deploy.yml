name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_ACCOUNT_ID: 715923838341
  ECR_REPO_NAME: eatry-production-kiosk
  IMAGE_NAME: eatry-production-kiosk
  ECS_CLUSTER_NAME: eatry-production-cluster
  ECS_SERVICE_NAME: eatry-production-kiosk
  CLOUDWATCH_LOG_GROUP: /aws/ecs/eatry/eatry-production-kiosk-tg

  # UAE — me-central-1
  AWS_REGION_UAE: me-central-1

  # India (Mumbai) — ap-south-1
  AWS_REGION_INDIA: ap-south-1

jobs:
  build-and-deploy:
    name: Build and Deploy to ECS (UAE + India)
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Docker image once ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:latest .

      # ── UAE (me-central-1) ────────────────────────────────────────────────
      # (UAE steps are intentionally commented out — deployments will run to India)

      # ── India / Mumbai (ap-south-1) ───────────────────────────────────────
      - name: Configure AWS credentials (India)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_INDIA }}

      - name: Create CloudWatch Log Group (India)
        run: |
          aws logs create-log-group \
            --log-group-name "${{ env.CLOUDWATCH_LOG_GROUP }}" \
            --region ${{ env.AWS_REGION_INDIA }} || true

      - name: Login to Amazon ECR (India)
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Push image to ECR (India)
        run: |
          IMAGE_URI=${{ env.ECR_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION_INDIA }}.amazonaws.com/${{ env.ECR_REPO_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:latest $IMAGE_URI
          docker push $IMAGE_URI

      - name: Deploy to ECS (India)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION_INDIA }}
